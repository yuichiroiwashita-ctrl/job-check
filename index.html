<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>適職診断 - あなたにぴったりの仕事を見つけよう</title>
  
  <!-- Chart.js -->
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  
  <!-- LIFF SDK -->
  <script charset="utf-8" src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
  
  <!-- Google Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
  
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      -webkit-tap-highlight-color: transparent;
    }

    :root {
      --primary: #6366F1;
      --primary-dark: #4F46E5;
      --secondary: #06D6A0;
      --type-color1: #6366F1;
      --type-color2: #8B5CF6;
      --type-light: #EEF2FF;
      --type-text: #4338CA;
    }

    body {
      font-family: 'Noto Sans JP', sans-serif;
      background: #F9FAFB;
      color: #1F2937;
      line-height: 1.6;
      overflow-x: hidden;
    }

    .screen {
      min-height: 100vh;
      display: none;
      flex-direction: column;
    }

    .screen.active {
      display: flex;
    }

    /* =========================
       スタート画面
       ========================= */
    #screen-start {
      background: linear-gradient(135deg, #667EEA 0%, #764BA2 100%);
      color: white;
      text-align: center;
      padding: 40px 20px;
      justify-content: center;
    }

    .hero-title {
      font-size: 32px;
      font-weight: 900;
      margin-bottom: 12px;
      text-shadow: 0 2px 10px rgba(0,0,0,0.2);
    }

    .hero-subtitle {
      font-size: 15px;
      opacity: 0.9;
      margin-bottom: 40px;
    }

    .hero-emoji {
      font-size: 80px;
      margin: 20px 0;
      animation: bounce 2s infinite;
    }

    @keyframes bounce {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-15px); }
    }

    .btn-primary {
      display: inline-block;
      padding: 18px 50px;
      background: white;
      color: #667EEA;
      font-size: 18px;
      font-weight: 700;
      border-radius: 50px;
      border: none;
      cursor: pointer;
      box-shadow: 0 8px 25px rgba(0,0,0,0.15);
      transition: all 0.3s;
    }

    .btn-primary:active {
      transform: scale(0.96);
    }

    /* =========================
       共通コンテナ
       ========================= */
    .container {
      flex: 1;
      padding: 20px;
      max-width: 480px;
      margin: 0 auto;
      width: 100%;
    }

    .header {
      text-align: center;
      margin-bottom: 24px;
    }

    .header h2 {
      font-size: 22px;
      font-weight: 700;
      color: #1F2937;
      margin-bottom: 8px;
    }

    .header p {
      font-size: 14px;
      color: #6B7280;
    }

    /* プログレスバー */
    .progress-bar {
      height: 6px;
      background: #E5E7EB;
      border-radius: 999px;
      overflow: hidden;
      margin-bottom: 24px;
    }

    .progress-fill {
      height: 100%;
      background: linear-gradient(90deg, var(--primary), var(--secondary));
      border-radius: 999px;
      transition: width 0.4s ease;
    }

    /* =========================
       MBTIカード選択
       ========================= */
    .mbti-grid {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 10px;
      margin-bottom: 20px;
    }

    .mbti-card {
      aspect-ratio: 1;
      background: white;
      border: 2px solid #E5E7EB;
      border-radius: 16px;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      transition: all 0.2s;
      padding: 8px;
    }

    .mbti-card:active {
      transform: scale(0.95);
    }

    .mbti-card.selected {
      border-color: var(--primary);
      background: linear-gradient(135deg, #EEF2FF, #E0E7FF);
      box-shadow: 0 4px 12px rgba(99, 102, 241, 0.2);
    }

    .mbti-type {
      font-size: 18px;
      font-weight: 900;
      color: #1F2937;
      margin-bottom: 4px;
    }

    .mbti-desc {
      font-size: 9px;
      color: #6B7280;
      text-align: center;
      line-height: 1.3;
    }

    /* =========================
       質問カード
       ========================= */
    .question-card {
      background: white;
      border-radius: 24px;
      padding: 28px 24px;
      margin-bottom: 24px;
      box-shadow: 0 4px 20px rgba(0,0,0,0.06);
    }

    .question-number {
      display: inline-block;
      background: linear-gradient(135deg, var(--primary), var(--secondary));
      color: white;
      font-size: 12px;
      font-weight: 700;
      padding: 4px 12px;
      border-radius: 999px;
      margin-bottom: 12px;
    }

    .question-text {
      font-size: 18px;
      font-weight: 700;
      color: #1F2937;
      line-height: 1.5;
    }

    .options {
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .option-card {
      background: #F9FAFB;
      border: 2px solid #E5E7EB;
      border-radius: 16px;
      padding: 18px 20px;
      cursor: pointer;
      transition: all 0.2s;
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .option-card:active {
      transform: scale(0.98);
    }

    .option-card.selected {
      border-color: var(--primary);
      background: linear-gradient(135deg, #EEF2FF, #E0E7FF);
      box-shadow: 0 4px 12px rgba(99, 102, 241, 0.15);
    }

    .option-radio {
      width: 22px;
      height: 22px;
      border: 2px solid #D1D5DB;
      border-radius: 50%;
      flex-shrink: 0;
      position: relative;
      transition: all 0.2s;
    }

    .option-card.selected .option-radio {
      border-color: var(--primary);
      background: var(--primary);
    }

    .option-card.selected .option-radio::after {
      content: '✓';
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      color: white;
      font-size: 14px;
      font-weight: 900;
    }

    .option-text {
      flex: 1;
      font-size: 15px;
      font-weight: 600;
      color: #374151;
      line-height: 1.4;
    }

    .btn-next {
      width: 100%;
      padding: 18px;
      background: linear-gradient(135deg, var(--primary), var(--primary-dark));
      color: white;
      border: none;
      border-radius: 16px;
      font-size: 17px;
      font-weight: 700;
      cursor: pointer;
      box-shadow: 0 6px 20px rgba(99, 102, 241, 0.3);
      transition: all 0.2s;
      font-family: 'Noto Sans JP', sans-serif;
    }

    .btn-next:disabled {
      opacity: 0.5;
      cursor: not-allowed;
    }

    .btn-next:active:not(:disabled) {
      transform: scale(0.98);
    }

    .btn-back {
      width: 100%;
      padding: 16px;
      background: white;
      color: #6B7280;
      border: 2px solid #E5E7EB;
      border-radius: 14px;
      font-size: 15px;
      font-weight: 700;
      cursor: pointer;
      transition: all 0.2s;
      font-family: 'Noto Sans JP', sans-serif;
      margin-top: 12px;
    }

    .btn-back:active {
      background: #F9FAFB;
      transform: scale(0.98);
    }

    /* =========================
       ユーザー情報フォーム
       ========================= */
    .form-card {
      background: white;
      border-radius: 24px;
      padding: 24px;
      margin-bottom: 20px;
      box-shadow: 0 4px 20px rgba(0,0,0,0.06);
    }

    .form-group {
      margin-bottom: 20px;
    }

    .form-label {
      display: block;
      font-size: 14px;
      font-weight: 600;
      color: #374151;
      margin-bottom: 8px;
    }

    .form-label .required {
      color: #EF4444;
      margin-left: 4px;
    }

    .form-input {
      width: 100%;
      padding: 14px 16px;
      border: 2px solid #E5E7EB;
      border-radius: 12px;
      font-size: 15px;
      font-family: 'Noto Sans JP', sans-serif;
      transition: all 0.2s;
    }

    .form-input:focus {
      outline: none;
      border-color: var(--primary);
      box-shadow: 0 0 0 3px rgba(99, 102, 241, 0.1);
    }

    .form-input::placeholder {
      color: #9CA3AF;
    }

    .checkbox-label {
      display: flex;
      align-items: start;
      gap: 10px;
      cursor: pointer;
      font-size: 13px;
      color: #4B5563;
      line-height: 1.5;
    }

    .checkbox-label input[type="checkbox"] {
      width: 20px;
      height: 20px;
      flex-shrink: 0;
      cursor: pointer;
      margin-top: 2px;
    }

    /* =========================
       ローディング画面
       ========================= */
    #screen-loading {
      background: linear-gradient(135deg, #667EEA 0%, #764BA2 100%);
      color: white;
      justify-content: center;
      align-items: center;
      text-align: center;
    }

    .loading-spinner {
      width: 80px;
      height: 80px;
      border: 6px solid rgba(255,255,255,0.3);
      border-top-color: white;
      border-radius: 50%;
      animation: spin 1s linear infinite;
      margin-bottom: 24px;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    .loading-text {
      font-size: 20px;
      font-weight: 700;
    }

    /* ==============================
       結果画面 - ポップスタイルB
       ============================== */

    /* ヒーローヘッダー */
    .result-hero {
      position: relative;
      overflow: hidden;
      padding: 48px 24px 40px;
      text-align: center;
      color: white;
      background: linear-gradient(135deg, #6366F1, #8B5CF6);
    }

    .hero-circle {
      position: absolute;
      border-radius: 50%;
      background: rgba(255,255,255,0.1);
      animation: float 6s ease-in-out infinite;
    }
    .hero-circle-1 {
      width: 200px; 
      height: 200px;
      top: -80px; 
      right: -60px;
      animation-delay: 0s;
    }
    .hero-circle-2 {
      width: 150px; 
      height: 150px;
      bottom: -60px; 
      left: -40px;
      animation-delay: 2s;
    }

    @keyframes float {
      0%, 100% { transform: translateY(0px) rotate(0deg); }
      50% { transform: translateY(-15px) rotate(5deg); }
    }

    /* タイプアイコン */
    .result-icon-wrap {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: 100px;
      height: 100px;
      background: rgba(255,255,255,0.2);
      backdrop-filter: blur(10px);
      border-radius: 50%;
      margin-bottom: 16px;
      border: 3px solid rgba(255,255,255,0.4);
      animation: iconBounce 0.8s cubic-bezier(0.36,0.07,0.19,0.97) both;
    }

    @keyframes iconBounce {
      0% { transform: scale(0) rotate(-180deg); opacity: 0; }
      60% { transform: scale(1.15) rotate(10deg); opacity: 1; }
      100% { transform: scale(1) rotate(0deg); opacity: 1; }
    }

    .result-icon-emoji {
      font-size: 52px;
      line-height: 1;
    }

    /* タイプ名テキスト */
    .result-label-top {
      font-size: 13px;
      font-weight: 600;
      opacity: 0.85;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      margin-bottom: 6px;
    }

    .result-type-name {
      font-size: 34px;
      font-weight: 900;
      letter-spacing: -0.02em;
      margin-bottom: 8px;
      text-shadow: 0 2px 12px rgba(0,0,0,0.15);
      animation: slideUp 0.6s ease both 0.2s;
    }

    .result-catch {
      font-size: 14px;
      opacity: 0.9;
      line-height: 1.6;
      max-width: 280px;
      margin: 0 auto 16px;
      animation: slideUp 0.6s ease both 0.35s;
    }

    @keyframes slideUp {
      from { transform: translateY(20px); opacity: 0; }
      to { transform: translateY(0); opacity: 1; }
    }

    /* MBTIバッジ */
    .result-mbti-badge {
      display: inline-block;
      background: rgba(255,255,255,0.25);
      border: 2px solid rgba(255,255,255,0.5);
      border-radius: 999px;
      padding: 5px 18px;
      font-size: 14px;
      font-weight: 700;
      letter-spacing: 0.1em;
      backdrop-filter: blur(5px);
    }

    /* コンテンツエリア */
    .result-content {
      padding: 20px 16px 32px;
      display: flex;
      flex-direction: column;
      gap: 16px;
    }

    /* カード共通 */
    .result-card {
      background: white;
      border-radius: 20px;
      padding: 20px;
      box-shadow: 0 4px 20px rgba(0,0,0,0.07);
      animation: slideUp 0.5s ease both;
    }

    .result-card-header {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 16px;
    }

    .result-card-icon {
      font-size: 20px;
    }

    .result-card-header h3 {
      font-size: 16px;
      font-weight: 700;
      color: #1F2937;
    }

    /* レーダーチャート */
    .radar-wrap {
      position: relative;
      width: 100%;
      max-width: 300px;
      margin: 0 auto;
      aspect-ratio: 1;
    }

    /* 強みバッジ */
    .strengths-container {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
    }

    .strength-badge {
      display: inline-flex;
      align-items: center;
      gap: 4px;
      padding: 8px 14px;
      border-radius: 999px;
      font-size: 13px;
      font-weight: 600;
      background: var(--type-light);
      color: var(--type-text);
      border: 2px solid var(--type-color1);
      animation: badgePop 0.4s cubic-bezier(0.36,0.07,0.19,0.97) both;
    }

    @keyframes badgePop {
      0% { transform: scale(0); opacity: 0; }
      70% { transform: scale(1.1); }
      100% { transform: scale(1); opacity: 1; }
    }

    /* 職種タグ */
    .jobs-container {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
    }

    .job-tag {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 10px 16px;
      background: #F8FAFC;
      border: 2px solid #E2E8F0;
      border-radius: 12px;
      font-size: 13px;
      font-weight: 600;
      color: #374151;
    }

    .job-tag::before {
      content: '✓';
      color: var(--type-color1, #6366F1);
      font-weight: 900;
    }

    /* 企業カード */
    .companies-container {
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .company-card {
      display: flex;
      align-items: center;
      gap: 14px;
      padding: 16px;
      background: #FAFAFA;
      border: 2px solid #F1F5F9;
      border-radius: 16px;
      cursor: pointer;
      text-decoration: none;
      transition: all 0.2s ease;
      position: relative;
      overflow: hidden;
    }

    .company-card::before {
      content: '';
      position: absolute;
      left: 0; 
      top: 0; 
      bottom: 0;
      width: 4px;
      background: linear-gradient(180deg, var(--type-color1, #6366F1), var(--type-color2, #8B5CF6));
      border-radius: 4px 0 0 4px;
    }

    .company-card:active {
      transform: scale(0.98);
      background: #F1F5F9;
    }

    .company-logo {
      width: 50px;
      height: 50px;
      border-radius: 12px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 24px;
      flex-shrink: 0;
      background: var(--type-light, #EEF2FF);
    }

    .company-info {
      flex: 1;
      min-width: 0;
    }

    .company-name {
      font-size: 15px;
      font-weight: 700;
      color: #1F2937;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .company-industry-tag {
      display: inline-block;
      font-size: 11px;
      font-weight: 600;
      padding: 2px 8px;
      border-radius: 999px;
      background: var(--type-light, #EEF2FF);
      color: var(--type-text, #4338CA);
      margin: 3px 0;
    }

    .company-comment {
      font-size: 12px;
      color: #6B7280;
      line-height: 1.4;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .company-arrow {
      font-size: 18px;
      color: #9CA3AF;
      flex-shrink: 0;
    }

    /* CTA エリア */
    .result-cta-area {
      display: flex;
      flex-direction: column;
      gap: 10px;
      margin-top: 4px;
    }

    .cta-line-btn {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      width: 100%;
      padding: 18px;
      background: linear-gradient(135deg, #06C755, #00B900);
      color: white;
      border: none;
      border-radius: 16px;
      font-size: 17px;
      font-weight: 800;
      font-family: 'Noto Sans JP', sans-serif;
      cursor: pointer;
      box-shadow: 0 6px 20px rgba(6, 199, 85, 0.35);
      transition: all 0.2s;
      letter-spacing: -0.01em;
    }

    .cta-line-btn:active {
      transform: scale(0.98);
      box-shadow: 0 2px 10px rgba(6, 199, 85, 0.25);
    }

    .line-icon { 
      font-size: 20px; 
    }

    .sub-cta-row {
      display: flex;
      gap: 10px;
    }

    .cta-share-btn, .cta-restart-btn {
      flex: 1;
      padding: 14px;
      border: 2px solid #E5E7EB;
      border-radius: 14px;
      font-size: 14px;
      font-weight: 700;
      font-family: 'Noto Sans JP', sans-serif;
      cursor: pointer;
      transition: all 0.2s;
      background: white;
      color: #374151;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 6px;
    }

    .cta-share-btn:active, .cta-restart-btn:active {
      background: #F3F4F6;
      transform: scale(0.97);
    }

    /* コンフェッティ */
    .confetti {
      position: fixed;
      width: 10px;
      height: 10px;
      pointer-events: none;
      z-index: 9999;
    }
  </style>
</head>
<body>

  <!-- スタート画面 -->
  <div id="screen-start" class="screen active">
    <div class="hero-emoji">🎯</div>
    <h1 class="hero-title">適職診断</h1>
    <p class="hero-subtitle">あなたにぴったりの仕事を見つけよう</p>
    <button class="btn-primary" onclick="startDiagnosis()">診断をはじめる</button>
  </div>

  <!-- MBTI選択画面 -->
  <div id="screen-mbti" class="screen">
    <div class="container">
      <div class="header">
        <h2>あなたのMBTIタイプは？</h2>
        <p>16タイプから選択してください</p>
      </div>
      
      <div class="mbti-grid" id="mbti-grid"></div>
      
      <button class="btn-next" id="btn-mbti-next" onclick="goToQuestions()" disabled>次へ進む</button>
    </div>
  </div>

  <!-- 質問画面 -->
  <div id="screen-questions" class="screen">
    <div class="container">
      <div class="progress-bar">
        <div class="progress-fill" id="progress-fill" style="width: 0%"></div>
      </div>
      
      <div class="question-card">
        <span class="question-number" id="question-number">Q1</span>
        <p class="question-text" id="question-text"></p>
      </div>
      
      <div class="options" id="options"></div>
      
      <button class="btn-back" id="btn-question-back" onclick="prevQuestion()" style="display: none;">← 前の質問に戻る</button>
    </div>
  </div>

  <!-- ユーザー情報入力画面 -->
  <div id="screen-userinfo" class="screen">
    <div class="container">
      <div class="header">
        <h2>あと少しで結果がわかります！</h2>
        <p>あなたの情報を教えてください</p>
      </div>
      
      <div class="form-card">
        <div class="form-group">
          <label class="form-label">氏名<span class="required">*</span></label>
          <input type="text" class="form-input" id="input-name" placeholder="山田 太郎" required>
        </div>
        
        <div class="form-group">
          <label class="form-label">メールアドレス<span class="required">*</span></label>
          <input type="email" class="form-input" id="input-email" placeholder="example@email.com" required>
        </div>
        
        <div class="form-group">
          <label class="form-label">電話番号<span class="required">*</span></label>
          <input type="tel" class="form-input" id="input-phone" placeholder="090-1234-5678" required>
        </div>
        
        <div class="form-group">
          <label class="form-label">大学名</label>
          <input type="text" class="form-input" id="input-university" placeholder="〇〇大学">
        </div>
        
        <div class="form-group">
          <label class="form-label">卒業予定年<span class="required">*</span></label>
          <select class="form-input" id="input-graduation" required>
            <option value="">選択してください</option>
            <option value="2025年3月">2025年3月</option>
            <option value="2025年9月">2025年9月</option>
            <option value="2026年3月">2026年3月</option>
            <option value="2026年9月">2026年9月</option>
            <option value="2027年3月">2027年3月</option>
            <option value="2027年9月">2027年9月</option>
            <option value="2028年3月">2028年3月</option>
            <option value="2028年9月">2028年9月</option>
          </select>
        </div>
        
        <div class="form-group">
          <label class="form-label">希望勤務地</label>
          <select class="form-input" id="input-location">

        const card = document.createElement('div');
        card.className = 'option-card';
        // 前に選択した答えがあれば選択状態を保持
        if (answers[currentQuestion] === opt.type) {
          card.classList.add('selected');
        }
        card.innerHTML = `
          <div class="option-radio"></div>
          <div class="option-text">${opt.text}</div>
        `;
        card.onclick = () => selectOption(idx, card, opt.type);
        optionsEl.appendChild(card);
      });
      
      updateProgress();
      updateBackButton();
    }

    function selectOption(idx, element, type) {
      answers[currentQuestion] = type;
      document.querySelectorAll('.option-card').forEach(c => c.classList.remove('selected'));
      element.classList.add('selected');
      
      // 0.5秒後に自動で次の質問へ
      setTimeout(() => {
        nextQuestion();
      }, 500);
    }

    function updateProgress() {
      const progress = ((currentQuestion + 1) / questions.length) * 100;
      document.getElementById('progress-fill').style.width = progress + '%';
    }

    function updateBackButton() {
      const backBtn = document.getElementById('btn-question-back');
      if (currentQuestion > 0) {
        backBtn.style.display = 'block';
      } else {
        backBtn.style.display = 'none';
      }
    }

    function prevQuestion() {
      if (currentQuestion > 0) {
        currentQuestion--;
        renderQuestion();
      }
    }

    function nextQuestion() {
      if (currentQuestion < questions.length - 1) {
        currentQuestion++;
        renderQuestion();
      } else {
        showScreen('screen-userinfo');
        prefillUserInfo();
      }
    }

    // =============================
    // ユーザー情報入力
    // =============================
    function prefillUserInfo() {
      if (liffUser) {
        document.getElementById('input-name').value = liffUser.displayName || '';
      }
    }

    async function submitUserInfo() {
      console.log('submitUserInfo() が呼ばれました');
      
      const name = document.getElementById('input-name').value.trim();
      const email = document.getElementById('input-email').value.trim();
      const phone = document.getElementById('input-phone').value.trim();
      const university = document.getElementById('input-university').value.trim();
      const graduation = document.getElementById('input-graduation').value;
      const location = document.getElementById('input-location').value;
      const consent = document.getElementById('input-consent').checked;

      console.log('取得した値:', { name, email, phone, university, graduation, location, consent });

      if (!name || !email || !phone || !graduation || !consent) {
        console.log('バリデーションエラー');
        alert('必須項目を入力してください');
        return;
      }

      userData = {
        lineUserId: liffUser ? liffUser.userId : '',
        lineDisplayName: liffUser ? liffUser.displayName : '',
        name, email, phone, university, graduation, location,
        mbtiType: selectedMBTI,
        timestamp: new Date().toISOString()
      };

      // デバッグ用（開発時のみ）
      console.log('送信するユーザーデータ:', userData);

      // 診断結果計算
      calculateResult();

      // スプレッドシート保存
      saveToSpreadsheet();

      // ローディング表示
      showScreen('screen-loading');

      // 結果表示
      setTimeout(() => {
        showResult();
        showScreen('screen-result');
        startConfetti();
      }, 2000);
    }

    // =============================
    // 診断結果計算
    // =============================
    function calculateResult() {
      const scores = {
        leader: 0,
        creator: 0,
        supporter: 0,
        analyst: 0
      };

      // MBTIベーススコア
      const mbti = selectedMBTI || 'INTJ';
      if (mbti.includes('E')) scores.leader += 10;
      if (mbti.includes('N')) scores.creator += 10;
      if (mbti.includes('F')) scores.supporter += 10;
      if (mbti.includes('T')) scores.analyst += 10;
      if (mbti.includes('J')) scores.leader += 5;
      if (mbti.includes('P')) scores.creator += 5;

      // 回答スコア
      answers.forEach(type => {
        scores[type] = (scores[type] || 0) + 10;
      });

      // タイプマッピング
      const maxScore = Math.max(...Object.values(scores));
      const maxType = Object.keys(scores).find(k => scores[k] === maxScore);

      const typeMap = {
        leader: scores.leader > 40 ? 'manager' : 'strategist',
        creator: scores.creator > 40 ? 'creator' : 'specialist',
        supporter: 'supporter',
        analyst: scores.analyst > 50 ? 'analyst' : 'engineer'
      };

      // 営業タイプ判定
      if (scores.leader > 35 && answers.filter(a => a === 'leader').length >= 4) {
        finalResult = 'sales';
      } else {
        finalResult = typeMap[maxType] || 'strategist';
      }
    }

    // =============================
    // 結果表示（スタイルB）
    // =============================
    function showResult() {
      const config = typeConfig[finalResult];
      if (!config) return;
      
      // CSS変数でタイプカラーをセット
      const root = document.documentElement;
      root.style.setProperty('--type-color1', config.color1);
      root.style.setProperty('--type-color2', config.color2);
      root.style.setProperty('--type-light', config.light);
      root.style.setProperty('--type-text', config.textColor);

      // ① ヒーローグラデーション
      document.getElementById('result-hero').style.background = 
        `linear-gradient(135deg, ${config.color1}, ${config.color2})`;

      // ② アイコン・タイプ名
      document.getElementById('result-icon-emoji').textContent = config.icon;
      document.getElementById('result-type-name').textContent = config.label + 'タイプ';
      
      // ③ キャッチコピー
      const resultData = getResultData(finalResult);
      document.getElementById('result-catch').textContent = resultData.catch;
      
      // ④ MBTIバッジ
      document.getElementById('result-mbti-text').textContent = selectedMBTI || 'MBTI';

      // ⑤ 強みバッジ生成
      const strengthsEl = document.getElementById('strengths-container');
      strengthsEl.innerHTML = '';
      config.strengths.forEach((s, i) => {
        const badge = document.createElement('span');
        badge.className = 'strength-badge';
        badge.style.animationDelay = `${i * 0.08}s`;
        badge.textContent = '✦ ' + s;
        strengthsEl.appendChild(badge);
      });

      // ⑥ 職種タグ生成
      const jobsEl = document.getElementById('jobs-container');
      jobsEl.innerHTML = '';
      resultData.jobs.forEach(job => {
        const tag = document.createElement('span');
        tag.className = 'job-tag';
        tag.textContent = job;
        jobsEl.appendChild(tag);
      });

      // ⑦ 企業カード生成
      const companiesEl = document.getElementById('companies-container');
      companiesEl.innerHTML = '';
      resultData.companies.forEach(company => {
        const card = document.createElement('a');
        card.className = 'company-card';
        card.href = 'https://timerex.net/s/s.fit5956_d2a0/4947bd25/';
        card.target = '_blank';
        card.innerHTML = `
          <div class="company-logo">${company.emoji}</div>
          <div class="company-info">
            <div class="company-name">${company.name}</div>
            <span class="company-industry-tag">${company.industry}</span>
            <div class="company-comment">${company.comment}</div>
          </div>
          <div class="company-arrow">›</div>
        `;
        companiesEl.appendChild(card);
      });

      // ⑧ レーダーチャート（Chart.js）
      if (radarChartInstance) {
        radarChartInstance.destroy();
        radarChartInstance = null;
      }
      
      const ctx = document.getElementById('radarChart').getContext('2d');
      radarChartInstance = new Chart(ctx, {
        type: 'radar',
        data: {
          labels: ['リーダーシップ', '創造性', '分析力', '協調性', '行動力', '専門性'],
          datasets: [{
            data: config.radarData,
            backgroundColor: config.color1 + '30',
            borderColor: config.color1,
            borderWidth: 2.5,
            pointBackgroundColor: config.color1,
            pointBorderColor: '#fff',
            pointBorderWidth: 2,
            pointRadius: 5,
            pointHoverRadius: 7,
          }]
        },
        options: {
          responsive: true,
          maintainAspectRatio: true,
          animation: {
            duration: 1000,
            easing: 'easeOutQuart'
          },
          scales: {
            r: {
              min: 0, 
              max: 100,
              ticks: {
                display: false,
                stepSize: 25
              },
              grid: {
                color: '#E5E7EB',
                lineWidth: 1
              },
              angleLines: {
                color: '#E5E7EB',
                lineWidth: 1
              },
              pointLabels: {
                font: { 
                  size: 11, 
                  family: "'Noto Sans JP', sans-serif", 
                  weight: '600' 
                },
                color: '#4B5563'
              }
            }
          },
          plugins: {
            legend: { display: false }
          }
        }
      });
    }

    // =============================
    // スプレッドシート保存
    // =============================
    async function saveToSpreadsheet() {
      const data = {
        ...userData,
        resultType: finalResult,
        q1: answers[0] || '',
        q2: answers[1] || '',
        q3: answers[2] || '',
        q4: answers[3] || '',
        q5: answers[4] || '',
        q6: answers[5] || '',
        q7: answers[6] || '',
        q8: answers[7] || '',
        q9: answers[8] || ''
      };

      // デバッグ用（開発時のみ）
      console.log('スプレッドシートに送信するデータ:', data);

      try {
        await fetch(GAS_URL, {
          method: 'POST',
          mode: 'no-cors',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(data)
        });
        console.log('データ送信完了');
      } catch (err) {
        console.error('保存エラー:', err);
      }
    }

    // =============================
    // アクション
    // =============================
    function goToLINE() {
      if (typeof liff !== 'undefined' && liff.isInClient()) {
        liff.closeWindow();
      } else {
        window.location.href = 'https://liff.line.me/2009349788-VSECkyT3';
      }
    }

    function shareToX() {
      const config = typeConfig[finalResult];
      const text = `私は「${config.label}タイプ」でした！\nあなたの適職は？ #適職診断`;
      const url = window.location.href;
      window.open(`https://twitter.com/intent/tweet?text=${encodeURIComponent(text)}&url=${encodeURIComponent(url)}`, '_blank');
    }

    function restartDiagnosis() {
      if (radarChartInstance) {
        radarChartInstance.destroy();
        radarChartInstance = null;
      }
      selectedMBTI = null;
      currentQuestion = 0;
      answers = [];
      finalResult = null;
      userData = {};
      showScreen('screen-start');
    }

    // =============================
    // コンフェッティ
    // =============================
    function startConfetti() {
      const config = typeConfig[finalResult];
      const colors = [config.color1, config.color2, '#FFFFFF', '#FFD700', config.light];
      
      for (let i = 0; i < 50; i++) {
        setTimeout(() => createConfetti(colors), i * 30);
      }
    }

    function createConfetti(colors) {
      const confetti = document.createElement('div');
      confetti.className = 'confetti';
      confetti.style.left = Math.random() * 100 + '%';
      confetti.style.top = '-10px';
      confetti.style.backgroundColor = colors[Math.floor(Math.random() * colors.length)];
      confetti.style.animation = `fall ${2 + Math.random() * 2}s linear`;
      
      document.body.appendChild(confetti);
      
      setTimeout(() => confetti.remove(), 4000);
    }

    // CSSアニメーション追加
    const style = document.createElement('style');
    style.textContent = `
      @keyframes fall {
        to {
          transform: translateY(100vh) rotate(360deg);
          opacity: 0;
        }
      }
    `;
    document.head.appendChild(style);
  </script>
</body>
